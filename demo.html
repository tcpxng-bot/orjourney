<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#F7F5F1" />
<title>OR Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   OR Journey — design tokens
   Soft Professional Journey Tracking · pastel · Apple Wallet / Muji
   ============================================================ */
:root{
  /* paper + ink */
  --paper:#F7F5F1;      /* warm white */
  --card:#FFFFFF;
  --ink:#2B2A28;        /* warm near-black */
  --ink-2:#6C675F;      /* muted */
  --ink-3:#9B958C;      /* faint */
  --line:#EAE6DE;       /* hairline */
  --line-2:#DED9CF;

  /* pastel family (brief palette) */
  --sage:#8FB394;      --sage-tint:#E7EFE5;
  --powder:#8FB4CC;    --powder-tint:#E4EEF3;
  --peach:#E5A987;     --peach-tint:#F8E7DC;
  --lavender:#A79FC7;  --lavender-tint:#EBE7F2;
  --amber:#D9A45B;     --amber-tint:#F6EBD6;
  --green:#6FAE7C;     --green-tint:#E4F0E4;
  --clay:#C57866;      --clay-tint:#F5E3DD;  /* calm destructive */

  --accent:var(--sage);
  --ring:#5E8F86;

  /* radii + shadow */
  --r-sm:10px; --r:16px; --r-lg:22px; --r-xl:28px; --r-pill:999px;
  --shadow-sm:0 1px 2px rgba(43,42,40,.05);
  --shadow:0 6px 20px -8px rgba(43,42,40,.16), 0 2px 6px -3px rgba(43,42,40,.08);
  --shadow-lg:0 24px 60px -20px rgba(43,42,40,.32);

  /* type */
  --sans:"IBM Plex Sans Thai","IBM Plex Sans",system-ui,-apple-system,sans-serif;
  --mono:"IBM Plex Sans","IBM Plex Sans Thai",ui-monospace,monospace;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --maxw:460px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  font-size:16px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:16px}
:focus-visible{outline:3px solid var(--ring);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============================================================ app shell */
#app{min-height:100dvh;display:flex;flex-direction:column}

/* desktop: sidebar + content, mobile: stacked */
.shell{display:flex;min-height:100dvh;width:100%;max-width:1200px;margin:0 auto}
.sidebar{display:none}
.main{flex:1;min-width:0;display:flex;flex-direction:column;position:relative}

.viewport{
  flex:1;width:100%;max-width:var(--maxw);margin:0 auto;
  padding:calc(var(--safe-top) + 8px) 18px 96px;
}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:color-mix(in srgb, var(--paper) 82%, transparent);
  backdrop-filter:saturate(140%) blur(16px);
  -webkit-backdrop-filter:saturate(140%) blur(16px);
  border-bottom:1px solid var(--line);
  padding:calc(var(--safe-top) + 10px) 18px 10px;
}
.topbar-in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:12px;min-height:34px}
.topbar h1{font-size:19px;font-weight:600;letter-spacing:-.01em;flex:1}
.topbar .sub{font-size:12.5px;color:var(--ink-2);font-weight:400}
.icon-btn{width:40px;height:40px;border-radius:var(--r-pill);display:grid;place-items:center;color:var(--ink-2);flex-shrink:0}
.icon-btn:hover{background:var(--line)}

.role-chip{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:600;padding:5px 11px;border-radius:var(--r-pill);
  background:var(--card);border:1px solid var(--line-2);color:var(--ink-2);
}
.role-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}

/* ---------- live indicator ---------- */
.live{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--green);letter-spacing:.02em}
.live .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);position:relative}
.live .pulse::after{content:"";position:absolute;inset:0;border-radius:50%;background:var(--green);animation:pulse 2s ease-out infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(3);opacity:0}}

/* ---------- section headers ---------- */
.section-title{font-size:13px;font-weight:600;color:var(--ink-2);letter-spacing:.02em;margin:22px 2px 12px;display:flex;align-items:center;gap:8px}
.section-title .count{margin-left:auto;font-weight:500;color:var(--ink-3);font-size:12px}
.eyebrow{font-size:11.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3)}

/* ============================================================ journey card
   signature: boarding-pass style with ticket notch */
.jcard{
  position:relative;background:var(--card);border-radius:var(--r-lg);
  border:1px solid var(--line);box-shadow:var(--shadow-sm);
  overflow:hidden;transition:transform .18s ease, box-shadow .18s ease;
  margin-bottom:14px;
}
.jcard:active{transform:scale(.99)}
.jcard.tap{cursor:pointer}
.jcard.tap:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.jcard-top{display:flex;gap:14px;padding:16px 16px 14px;align-items:center}
.jcard-body{flex:1;min-width:0}
.jcard-code{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink-2);letter-spacing:.06em}
.jcard-name{font-size:17px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.jcard-route{font-size:12.5px;color:var(--ink-2);margin-top:3px;display:flex;align-items:center;gap:5px}
.jcard-route svg{opacity:.6}

/* status pill: color + icon + text (never color alone) */
.status{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:var(--r-pill);
  border:1px solid transparent;line-height:1;
}
.ic{width:18px;height:18px;flex-shrink:0}
.em-ic .ic{width:26px;height:26px}
.ro-ic .ic{width:56%;height:56%}
.sb-brand .bm .ic{width:20px;height:20px}
.select-wrap .ic{width:18px;height:18px}
.status svg{width:14px;height:14px;flex-shrink:0}
.jcard-foot{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-top:1px dashed var(--line-2);
  background:linear-gradient(0deg,rgba(247,245,241,.5),transparent);
}
.jcard-time{font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:5px;margin-left:auto}
.jcard-time svg{opacity:.55}

/* ticket notches */
.jcard.ticket::before,.jcard.ticket::after{
  content:"";position:absolute;width:18px;height:18px;border-radius:50%;
  background:var(--paper);border:1px solid var(--line);
  top:calc(100% - 58px);z-index:2;
}
.jcard.ticket::before{left:-10px}
.jcard.ticket::after{right:-10px}

/* ============================================================ avatar */
.avatar{border-radius:50%;flex-shrink:0;display:grid;place-items:center;overflow:hidden}
.avatar svg{width:100%;height:100%;display:block}
.avatar.sz-lg{width:64px;height:64px}
.avatar.sz-md{width:52px;height:52px}
.avatar.sz-sm{width:38px;height:38px}

/* ============================================================ buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-size:16px;font-weight:600;padding:14px 20px;border-radius:var(--r);
  min-height:52px;width:100%;transition:transform .12s ease, filter .15s ease, background .15s;
  letter-spacing:-.01em;
}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:hover:not(:disabled){filter:brightness(1.12)}
.btn-accent{background:var(--sage);color:#1c3323}
.btn-accent:hover:not(:disabled){filter:brightness(1.05)}
.btn-soft{background:var(--card);color:var(--ink);border:1px solid var(--line-2)}
.btn-soft:hover:not(:disabled){background:var(--paper)}
.btn-ghost{background:transparent;color:var(--ink-2);min-height:auto;padding:8px 12px;font-size:14px}
.btn-danger{background:var(--clay-tint);color:#8a3b2c;border:1px solid transparent}
.btn-sm{min-height:44px;padding:10px 16px;font-size:14.5px;width:auto}
.btn .spin{width:18px;height:18px;border:2.5px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============================================================ timeline (transit rail) */
.timeline{position:relative;padding-left:6px;margin:8px 0}
.tl-item{position:relative;display:flex;gap:16px;padding-bottom:6px}
.tl-rail{position:relative;display:flex;flex-direction:column;align-items:center;width:24px;flex-shrink:0}
.tl-dot{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--line-2);background:var(--card);z-index:2;display:grid;place-items:center;flex-shrink:0;transition:all .3s}
.tl-dot svg{width:11px;height:11px}
.tl-line{width:2.5px;flex:1;background:var(--line-2);min-height:26px;transition:background .4s}
.tl-item.done .tl-dot{background:var(--green);border-color:var(--green);color:#fff}
.tl-item.done .tl-line{background:var(--green)}
.tl-item.current .tl-dot{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 0 0 5px color-mix(in srgb,var(--accent) 22%,transparent)}
.tl-item.current .tl-line{background:linear-gradient(var(--accent),var(--line-2))}
.tl-content{padding-bottom:22px;flex:1;min-width:0}
.tl-label{font-size:15px;font-weight:600;letter-spacing:-.01em}
.tl-item:not(.done):not(.current) .tl-label{color:var(--ink-3);font-weight:500}
.tl-meta{font-size:12.5px;color:var(--ink-2);margin-top:2px}
.tl-item.current .tl-label{color:var(--accent)}

/* ============================================================ bottom nav (mobile) */
.bottomnav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:color-mix(in srgb,var(--card) 88%,transparent);
  backdrop-filter:saturate(160%) blur(20px);-webkit-backdrop-filter:saturate(160%) blur(20px);
  border-top:1px solid var(--line);
  padding:8px 8px calc(8px + var(--safe-bot));
  display:flex;justify-content:space-around;max-width:var(--maxw);margin:0 auto;
}
.navbtn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:var(--r-sm);color:var(--ink-3);min-width:52px;min-height:48px;font-size:10.5px;font-weight:600;letter-spacing:.01em;transition:color .15s}
.navbtn svg{width:23px;height:23px;stroke-width:1.9}
.navbtn.active{color:var(--ink)}
.navbtn.active svg{stroke-width:2.2}
.navbtn:hover{color:var(--ink-2)}

/* ============================================================ bottom sheet */
.scrim{position:fixed;inset:0;background:rgba(43,42,40,.42);z-index:80;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:90;
  background:var(--card);border-radius:var(--r-xl) var(--r-xl) 0 0;
  max-width:var(--maxw);margin:0 auto;
  padding:10px 20px calc(24px + var(--safe-bot));
  transform:translateY(102%);transition:transform .3s cubic-bezier(.22,1,.36,1);
  box-shadow:var(--shadow-lg);max-height:88dvh;overflow-y:auto;
}
.sheet.open{transform:translateY(0)}
.sheet-grab{width:38px;height:5px;border-radius:99px;background:var(--line-2);margin:2px auto 16px}
.sheet h3{font-size:20px;font-weight:600;letter-spacing:-.01em;margin-bottom:6px}
.sheet .sheet-sub{color:var(--ink-2);font-size:14px;margin-bottom:20px}

/* ============================================================ forms */
.field{margin-bottom:18px}
.field label{display:block;font-size:13.5px;font-weight:600;color:var(--ink-2);margin-bottom:8px}
.select-wrap{position:relative}
.select-wrap svg{position:absolute;right:16px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--ink-3)}
/* custom dropdown (replaces native select for consistent styling) */
.dd{position:relative}
.dd-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border:1.5px solid var(--line-2);border-radius:var(--r);padding:14px 16px;font:inherit;font-size:15.5px;color:var(--ink);cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s}
.dd-btn:hover{border-color:var(--ink-3)}
.dd.open .dd-btn{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-tint)}
.dd-val{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dd-val.ph{color:var(--ink-3)}
.dd-chev{color:var(--ink-3);transition:transform .18s;flex-shrink:0}
.dd.open .dd-chev{transform:rotate(180deg)}
.dd-panel{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:60;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-lg);padding:6px;opacity:0;transform:translateY(-6px) scale(.985);transform-origin:top;pointer-events:none;transition:opacity .15s,transform .15s;max-height:264px;overflow:auto}
.dd.open .dd-panel{opacity:1;transform:none;pointer-events:auto}
.dd.up .dd-panel{top:auto;bottom:calc(100% + 6px);transform-origin:bottom;transform:translateY(6px) scale(.985)}
.dd.up.open .dd-panel{transform:none}
.dd-opt{width:100%;display:flex;align-items:center;gap:10px;background:none;border:0;border-radius:calc(var(--r) - 4px);padding:12px;font:inherit;font-size:15px;color:var(--ink);cursor:pointer;text-align:left;min-height:44px}
.dd-opt:hover{background:var(--sage-tint)}
.dd-opt .dd-tick{opacity:0;color:var(--sage);flex-shrink:0}
.dd-opt.sel{color:#2f5a3d;font-weight:600;background:var(--sage-tint)}
.dd-opt.sel .dd-tick{opacity:1}
.demo-tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.02em;color:#7a5417;background:var(--amber-tint);border:1px solid color-mix(in srgb,var(--amber) 40%,transparent);padding:1px 7px;border-radius:var(--r-pill);vertical-align:middle;margin-left:4px}
.lbl-ic{width:14px;height:14px;vertical-align:-2px;opacity:.65;margin-right:2px}
.room-chip{display:inline-flex;align-items:center;font-size:11.5px;font-weight:700;color:#4c4470;background:var(--lavender-tint);border:1px solid color-mix(in srgb,var(--lavender) 45%,transparent);padding:2px 9px;border-radius:var(--r-pill);margin-left:8px;vertical-align:middle;letter-spacing:.02em;white-space:nowrap}
.room-chip .room-ic{width:12px;height:12px;opacity:.8}
.room-filter{display:flex;gap:8px;overflow-x:auto;padding:8px 0 10px;margin-top:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.room-filter::-webkit-scrollbar{display:none}
.room-tab{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--line-2);border-radius:var(--r-pill);padding:8px 15px;font:inherit;font-size:14px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:all .14s}
.room-tab:hover{border-color:var(--ink-3)}
.room-tab.on{background:var(--ink);border-color:var(--ink);color:#fff}
.room-tab-n{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--sage);color:#fff;font-size:11px;font-weight:700}
.room-tab.on .room-tab-n{background:rgba(255,255,255,.28)}
select,.input{
  width:100%;padding:15px 16px;border-radius:var(--r);border:1.5px solid var(--line-2);
  background:var(--card);color:var(--ink);font-weight:500;appearance:none;min-height:54px;transition:border-color .15s;
}
select:focus,.input:focus{border-color:var(--accent);outline:none}
.input::placeholder{color:var(--ink-3);font-weight:400}
.help{font-size:12.5px;color:var(--ink-3);margin-top:7px;line-height:1.45}
.field-error{color:#a5432f;font-size:12.5px;margin-top:7px;display:flex;gap:5px;align-items:center}

/* avatar picker grid (PR) */
.avgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.avpick{border:1.5px solid var(--line);border-radius:var(--r);padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;background:var(--card);transition:border-color .15s,background .15s}
.avpick .nm{font-size:11px;font-weight:500;color:var(--ink-2)}
.avpick.sel{border-color:var(--accent);background:var(--sage-tint)}
.avpick:hover{border-color:var(--line-2)}

/* ============================================================ cards / misc */
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-sm)}
.stat-row{display:flex;gap:12px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;text-align:center}
.stat .n{font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1}
.stat .l{font-size:11.5px;color:var(--ink-2);margin-top:5px;font-weight:500}

.empty{text-align:center;padding:52px 24px;color:var(--ink-3)}
.empty .em-ic{width:56px;height:56px;border-radius:var(--r-lg);background:var(--card);border:1px solid var(--line);display:grid;place-items:center;margin:0 auto 16px;color:var(--ink-3)}
.empty h4{font-size:16px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.empty p{font-size:13.5px;max-width:260px;margin:0 auto;line-height:1.5}

.notice{background:var(--powder-tint);border:1px solid color-mix(in srgb,var(--powder) 40%,transparent);border-radius:var(--r);padding:13px 15px;font-size:13px;color:#355063;line-height:1.5;display:flex;gap:10px}
.notice svg{flex-shrink:0;margin-top:1px}
.chk{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none;font-size:14.5px;font-weight:500;padding:6px 0;min-height:44px}
.chk-box{width:26px;height:26px;border-radius:8px;border:2px solid var(--line-2);display:grid;place-items:center;flex-shrink:0;transition:all .15s;color:transparent}
.chk-box .ic{width:16px;height:16px}
.chk.on .chk-box,.chk-box.on{background:var(--green);border-color:var(--green);color:#fff}
.verify-box{background:var(--sage-tint);border:1px solid color-mix(in srgb,var(--sage) 34%,transparent);border-radius:var(--r);padding:13px 15px;margin:14px 0}
.verify-row{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--ink-1);padding:4px 0}
.verify-row .chk-box{width:22px;height:22px}
.verify-row .chk-box .ic{width:13px;height:13px}
.hint-foot{display:flex;gap:8px;align-items:flex-start;margin:22px 2px 4px;font-size:12.5px;line-height:1.5;color:var(--ink-3)}
.hint-foot .ic{width:15px;height:15px;margin-top:1px;flex-shrink:0;opacity:.7}
/* dashboard */
.room-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.room-card{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--rc,var(--line-2));border-radius:var(--r);padding:12px 13px;min-height:96px;display:flex;flex-direction:column;gap:9px}
.room-card.free{border-left-color:var(--line-2);background:color-mix(in srgb,var(--paper) 60%,var(--card))}
.room-card.tap{cursor:pointer;transition:box-shadow .15s,transform .12s}
.room-card.tap:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.room-card-h{display:flex;align-items:center;justify-content:space-between;gap:6px}
.room-name{font-size:13.5px;font-weight:700;letter-spacing:.02em;color:var(--ink)}
.room-state{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:var(--r-pill);background:var(--line);color:var(--ink-2);white-space:nowrap}
.room-state .ic{width:11px;height:11px}
.room-state.free{background:transparent;border:1px dashed var(--line-2);color:var(--ink-3)}
.room-empty{font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:5px;margin-top:auto}
.room-empty .ic{width:13px;height:13px}
.room-occ{display:flex;align-items:center;gap:9px;margin-top:auto}
.room-occ-n{font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.3}
.room-occ-t{font-size:11.5px;color:var(--ink-2);display:flex;align-items:center;gap:4px;margin-top:2px}
.room-occ-t .ic{width:12px;height:12px;opacity:.7}
.late-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid color-mix(in srgb,var(--amber) 38%,transparent);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:box-shadow .15s}
.late-row:hover{box-shadow:var(--shadow-sm)}
.late-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0}
.late-main{flex:1;min-width:0}
.late-n{font-size:14.5px;font-weight:600;color:var(--ink)}
.late-s{font-size:12px;color:var(--ink-2);margin-top:2px}
.late-t{text-align:right;flex-shrink:0}
.late-t b{display:block;font-size:14px;color:#7a5417;font-weight:700}
.late-t span{font-size:10.5px;color:var(--ink-3)}
.ok-note{display:flex;align-items:center;gap:8px;background:var(--green-tint);border:1px solid color-mix(in srgb,var(--green) 32%,transparent);border-radius:var(--r);padding:13px 15px;font-size:13.5px;color:#2f5a3d;font-weight:500}
.ok-note .ic{width:17px;height:17px}
.bar-row{display:flex;align-items:center;gap:10px;padding:7px 0}
.bar-lb{font-size:12.5px;color:var(--ink-2);width:104px;flex-shrink:0}
.bar-track{flex:1;height:9px;background:var(--line);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .4s ease}
.bar-val{font-size:12.5px;font-weight:700;color:var(--ink);width:66px;text-align:right;flex-shrink:0}
.total-row{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);margin-top:9px;padding-top:11px;font-size:13.5px;color:var(--ink-2)}
.total-row b{font-size:15.5px;color:var(--ink)}
/* emergency */
.em-chip{display:inline-flex;align-items:center;font-size:10.5px;font-weight:800;letter-spacing:.03em;color:#fff;background:var(--clay);padding:2px 8px;border-radius:var(--r-pill);margin-left:8px;vertical-align:middle}
.btn-emerg{background:var(--clay);color:#fff}
.btn-emerg:hover:not(:disabled){filter:brightness(1.06)}
.emerg-notice{background:var(--clay-tint);border-color:color-mix(in srgb,var(--clay) 42%,transparent);color:#7a3327}
.emerg-strip{display:flex;align-items:center;gap:9px;background:var(--clay-tint);border:1px solid color-mix(in srgb,var(--clay) 34%,transparent);border-radius:var(--r);padding:11px 14px;margin-top:12px;font-size:13px;color:#7a3327}
.emerg-strip .ic{width:16px;height:16px;flex-shrink:0}
.emerg-strip b{font-weight:700}
/* family tracking card */
.fam-card{background:linear-gradient(170deg,var(--sage-tint),var(--card) 62%);border:1px solid color-mix(in srgb,var(--sage) 34%,transparent);border-radius:var(--r-lg);padding:18px;margin-bottom:14px}
.fam-top{display:flex;align-items:center;gap:13px;margin-bottom:14px}
.fam-name{font-size:20px;font-weight:700;color:var(--ink)}
.fam-ward{font-size:12.5px;color:var(--ink-2);margin-top:2px}
.fam-code-wrap{background:var(--card);border:1px dashed color-mix(in srgb,var(--sage) 50%,transparent);border-radius:var(--r);padding:11px 14px;text-align:center;margin-bottom:14px}
.fam-code-lb{font-size:11.5px;color:var(--ink-3);letter-spacing:.03em;margin-bottom:2px}
.fam-code{font-family:var(--mono);font-size:30px;font-weight:700;letter-spacing:.14em;color:var(--ink)}
.fam-how{margin:0 0 12px;padding-left:20px;font-size:13px;color:var(--ink-1);line-height:1.85}
.fam-note{font-size:11.5px;color:var(--ink-3);line-height:1.55;margin:0}
.fam-actions{display:flex;flex-direction:column;gap:9px}
#printArea{display:none}
@media print{
  body>*{display:none!important}
  #printArea{display:block!important;position:static}
  .slip{width:100%;max-width:76mm;margin:0 auto;text-align:center;font-family:var(--sans);color:#000;padding:6mm 0}
  .slip-h{font-size:12pt;font-weight:700;margin-bottom:5mm}
  .slip-av svg{width:26mm;height:26mm}
  .slip-name{font-size:16pt;font-weight:700;margin-top:2mm}
  .slip-code{font-family:var(--mono);font-size:26pt;font-weight:700;letter-spacing:.12em;border:1.5pt dashed #000;border-radius:3mm;padding:2mm 0;margin:3mm 0}
  .slip-ward{font-size:10pt;margin-bottom:4mm}
  .slip-how{text-align:left;font-size:10pt;line-height:1.7;margin:0 0 4mm;padding-left:6mm}
  .slip-note{font-size:8.5pt;line-height:1.5;border-top:.5pt solid #999;padding-top:3mm}
}

/* toast */
#toasts{position:fixed;top:calc(var(--safe-top) + 12px);left:0;right:0;z-index:120;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--ink);color:var(--paper);padding:12px 18px;border-radius:var(--r-pill);font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;max-width:calc(var(--maxw) - 36px);animation:toastin .3s cubic-bezier(.22,1,.36,1)}
.toast.ok{background:#2f5a3d}.toast.err{background:#7e3626}
.toast svg{width:17px;height:17px}
@keyframes toastin{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* audit / history rows */
.log-row{display:flex;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line)}
.log-ic{width:34px;height:34px;border-radius:10px;background:var(--paper);border:1px solid var(--line);display:grid;place-items:center;flex-shrink:0;color:var(--ink-2)}
.log-main{flex:1;min-width:0}
.log-act{font-size:13.5px;font-weight:600}
.log-meta{font-size:12px;color:var(--ink-3);margin-top:1px;font-family:var(--mono)}
.log-time{font-size:11.5px;color:var(--ink-3);white-space:nowrap}

.qr-box{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.qr-box .qr{width:150px;height:150px;background:#fff;border-radius:12px;padding:10px;border:1px solid var(--line)}
.token{font-family:var(--mono);font-size:11px;color:var(--ink-3);word-break:break-all;text-align:center}

.list-divider{height:1px;background:var(--line);margin:6px 0}

/* login */
.login-wrap{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:32px 26px calc(40px + var(--safe-bot));max-width:var(--maxw);margin:0 auto}
.brandmark{width:76px;height:76px;border-radius:22px;background:linear-gradient(145deg,var(--sage-tint),var(--powder-tint));display:grid;place-items:center;margin-bottom:22px;box-shadow:var(--shadow-sm);border:1px solid var(--line)}
.login-wrap h1{font-size:30px;font-weight:600;letter-spacing:-.02em}
.login-wrap .tag{color:var(--ink-2);font-size:15px;margin-top:6px;margin-bottom:34px}
.role-list{display:flex;flex-direction:column;gap:10px}
.role-opt{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:var(--r);border:1.5px solid var(--line);background:var(--card);text-align:left;transition:border-color .15s,transform .12s}
.role-opt:hover{border-color:var(--line-2)}
.role-opt:active{transform:scale(.99)}
.role-opt .ro-ic{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;flex-shrink:0}
.role-opt .ro-name{font-weight:600;font-size:16px}
.role-opt .ro-desc{font-size:12.5px;color:var(--ink-2);margin-top:1px}
.role-opt .ro-arrow{margin-left:auto;color:var(--ink-3)}

.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ============================================================ desktop */
@media (min-width:860px){
  :root{--maxw:600px}
  .sidebar{
    display:flex;flex-direction:column;width:250px;flex-shrink:0;
    border-right:1px solid var(--line);padding:22px 16px;gap:4px;position:sticky;top:0;height:100dvh;
  }
  .sb-brand{display:flex;align-items:center;gap:11px;padding:6px 10px 20px}
  .sb-brand .bm{width:38px;height:38px;border-radius:11px;background:linear-gradient(145deg,var(--sage-tint),var(--powder-tint));display:grid;place-items:center;border:1px solid var(--line)}
  .sb-brand .nm{font-weight:600;font-size:16px}
  .sb-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r);color:var(--ink-2);font-weight:500;font-size:14.5px;transition:background .15s,color .15s}
  .sb-item svg{width:20px;height:20px}
  .sb-item.active{background:var(--sage-tint);color:var(--ink);font-weight:600}
  .sb-item:hover:not(.active){background:var(--paper)}
  .sb-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line)}
  .bottomnav{display:none}
  .viewport{padding-bottom:40px}
  .sheet{border-radius:var(--r-xl);top:50%;bottom:auto;left:50%;right:auto;transform:translate(-50%,-46%) scale(.96);width:min(460px,92vw);max-height:86dvh}
  .sheet.open{transform:translate(-50%,-50%) scale(1)}
  .stat .n{font-size:30px}
}
@media (max-width:859px){.sidebar{display:none}}
</style>

/* ---------------------------- MOCK DATA / STORE -------------------------- */
const WARDS = [
  {id:'w1', name:'อายุรกรรมหญิง 1'},
  {id:'w2', name:'สูตินรีเวชกรรม'},
  {id:'w3', name:'ศัลยกรรมหญิง'},
  {id:'w4', name:'นรีเวชกรรม'},
  {id:'er', name:'ห้องฉุกเฉิน (ER)', emergencyOnly:true},
];
/* wards that can log in and create routine journeys (ER is a source, not a ward user) */
const WARD_USERS = WARDS.filter(w=>!w.emergencyOnly);
const OR_ROOMS=[{id:'or1',name:'OR 1'},{id:'or2',name:'OR 2'},{id:'or3',name:'OR 3'},{id:'or4',name:'OR 4'}];

let SEQ = 1;
function now(){return Date.now()}
function genCode(){ // readable, avoid confusables O0 I1 B8
  const L='ACDEFGHJKMNPQRTUVWXY', N='234567';
  const p=s=>s[Math.floor(Math.random()*s.length)];
  return p(L)+p(N)+p(L)+p(N);
}
function genToken(){return 'orj_'+Array.from({length:24},()=>Math.floor(Math.random()*16).toString(16)).join('')}

const Store = {
  journeys:[], events:[], audit:[], listeners:new Set(), usedAvatars:{}, // usedAvatars[wardId] = Set
  online:true,

  emit(){this.listeners.forEach(f=>f())},
  sub(f){this.listeners.add(f);return()=>this.listeners.delete(f)},

  pickAvatar(wardId){
    const used = this.journeys.filter(j=>j.ward_id===wardId && !['COMPLETED','CANCELLED'].includes(j.status)).map(j=>j.avatar_id);
    const free = AVATARS.filter(a=>!used.includes(a.id));
    const pool = free.length?free:AVATARS;
    return pool[Math.floor(Math.random()*pool.length)].id;
  },
  uniqueCode(){let c;do{c=genCode()}while(this.journeys.some(j=>j.case_code===c && !['COMPLETED','CANCELLED'].includes(j.status)));return c},

  createJourney(wardId, byRole, roomId, emergency=false){
    const w = WARDS.find(x=>x.id===wardId);
    const room = OR_ROOMS.find(x=>x.id===roomId) || null;
    const j = {
      id:'j'+(SEQ++), case_code:this.uniqueCode(), ward_id:wardId, ward_name:w.name,
      avatar_id:this.pickAvatar(wardId), status: emergency?'PORTER_TO_OR':'WAITING_PORTER',
      is_emergency: !!emergency,
      current_location:w.name, or_room_id:room?room.id:null, or_room:room?room.name:null, dest:room?room.name:'ห้องผ่าตัด',
      staff_token:genToken(), public_code:null,
      verify1:null, verify2:null,
      created_at:now(), updated_at:now(),
      timestamps: emergency?{created_at_ward:now(), porter_received_at:now()}:{created_at_ward:now()},
    };
    j.public_code = j.case_code; // public tracking uses case code + avatar
    this.journeys.unshift(j);
    this.logEvent(j.id,'JOURNEY_CREATED',{ward:w.name});
    this.audit.unshift(auditRow(byRole,'JOURNEY_CREATED','journey',j.id,true,{ward:w.name}));
    this.audit.unshift(auditRow(byRole, emergency?'EMERGENCY_CREATED':'WAITING_PORTER','journey',j.id,true,emergency?{emergency:true}:{}));
    this.emit();
    return j;
  },

  transition(journeyId, to, byRole){
    const j = this.journeys.find(x=>x.id===journeyId);
    if(!j) return {ok:false,msg:'ไม่พบ Journey นี้'};
    const allowed = (TRANSITIONS[j.status]||[]).find(t=>t.to===to && t.role===byRole);
    if(!allowed){
      this.audit.unshift(auditRow(byRole,'INVALID_TRANSITION','journey',j.id,false,{from:j.status,to}));
      return {ok:false,msg:'ไม่สามารถอัปเดตสถานะนี้ได้ในบทบาทปัจจุบัน'};
    }
    j.status = to; j.updated_at = now();
    const tsKey = {PORTER_TO_OR:'porter_received_at',OR_VERIFY_1:'verify1_at',IN_OR:'entered_or_at',SURGERY_FINISHED:'surgery_finished_at',IN_RR:'received_rr_at',COMPLETED:'completed_at'}[to];
    if(tsKey) j.timestamps[tsKey]=now();
    this.logEvent(j.id,'STATUS_CHANGED',{to});
    this.audit.unshift(auditRow(byRole,'STATUS_CHANGED','journey',j.id,true,{to}));
    if(to==='COMPLETED'){
      j.staff_token=null; j.public_code=null; // revoke
      this.logEvent(j.id,'QR_REVOKED',{});
      this.audit.unshift(auditRow(byRole,'JOURNEY_COMPLETED','journey',j.id,true));
      this.audit.unshift(auditRow('SYSTEM','QR_REVOKED','journey',j.id,true));
    }
    this.emit();
    return {ok:true};
  },

  /* two-nurse identity verification. Records WHICH nurse confirmed the wristband
     matched — never the patient's name. step 2 must be a different nurse. */
  verify(journeyId, step, nurse, byRole){
    const j=this.journeys.find(x=>x.id===journeyId);
    if(!j) return {ok:false,msg:'ไม่พบ Journey นี้'};
    if(byRole!=='OR'){this.audit.unshift(auditRow(byRole,'INVALID_TRANSITION','journey',j.id,false,{verify:step}));return {ok:false,msg:'เฉพาะห้องผ่าตัดยืนยันตัวผู้ป่วยได้'}}
    // Emergency: identity is still verified, but one nurse is enough — recorded honestly as a single-nurse check.
    if(j.is_emergency){
      if(j.status!=='PORTER_TO_OR') return {ok:false,msg:'สถานะไม่ถูกต้องสำหรับการยืนยัน'};
      j.verify1={by:nurse, at:now(), solo:true};
      j.status='IN_OR'; j.updated_at=now(); j.timestamps.verify1_at=now(); j.timestamps.entered_or_at=now();
      this.logEvent(j.id,'IDENTITY_VERIFIED',{step:1, nurse, emergency:true, solo:true});
      this.audit.unshift(auditRow(byRole,'IDENTITY_VERIFIED','journey',j.id,true,{nurse, emergency:true, solo:true}));
      this.emit();
      return {ok:true};
    }
    if(step===1){
      if(j.status!=='PORTER_TO_OR') return {ok:false,msg:'สถานะไม่ถูกต้องสำหรับการยืนยันครั้งที่ 1'};
      j.verify1={by:nurse, at:now()}; j.status='OR_VERIFY_1'; j.updated_at=now(); j.timestamps.verify1_at=now();
    } else {
      if(j.status!=='OR_VERIFY_1') return {ok:false,msg:'ต้องยืนยันครั้งที่ 1 ก่อน'};
      if(j.verify1 && j.verify1.by===nurse) return {ok:false,msg:'ครั้งที่ 2 ต้องเป็นพยาบาลคนละคนกับครั้งที่ 1'};
      j.verify2={by:nurse, at:now()}; j.status='IN_OR'; j.updated_at=now(); j.timestamps.entered_or_at=now();
    }
    this.logEvent(j.id,'IDENTITY_VERIFIED',{step, nurse});
    this.audit.unshift(auditRow(byRole,'IDENTITY_VERIFIED','journey',j.id,true,{step, nurse}));
    this.emit();
    return {ok:true};
  },

  logEvent(jid,type,meta){this.events.unshift({id:'e'+now()+Math.random(),journey_id:jid,type,meta,at:now()})},

  publicLookup(avatarId, code, byRole){
    const j = this.journeys.find(x=>x.avatar_id===avatarId && x.public_code===code && x.public_code!==null);
    this.audit.unshift(auditRow(byRole,'PUBLIC_STATUS_LOOKUP','journey', j?j.id:null, !!j, {avatar:avatarId, code}));
    this.emit();
    return j||null;
  },
};
function auditRow(actor,action,rtype,rid,success,meta={}){
  return {actor, action, resource_type:rtype, resource_id:rid, success, at:now(), device:'iPhone · Safari', meta};
}

/* seed a few in-flight journeys for realistic boards */
function seed(){
  const M=60000;
  // in-flight: [ward, status, minsAgo(start), room]
  const specs=[['w2','IN_OR',-38,'or1'],['w2','SURGERY_FINISHED',-70,'or2'],['w1','OR_VERIFY_1',-48,'or3'],['w4','IN_RR',-95,'or1'],['w3','PORTER_TO_OR',-9,'or4'],['w1','WAITING_PORTER',-4,null]];
  specs.forEach(([wid,st,minsAgo,room])=>{
    const j=Store.createJourney(wid,'PORTER',room);
    j.status=st; j.created_at=now()+minsAgo*M; j.updated_at=now()+Math.floor(minsAgo/2)*M;
    const T=j.timestamps; T.created_at_ward=j.created_at;
    if(st!=='WAITING_PORTER') T.porter_received_at=j.created_at+3*M;
    // fill stage timestamps consistent with how far the case has progressed
    if(['OR_VERIFY_1','IN_OR','SURGERY_FINISHED','IN_RR'].includes(st)){
      T.verify1_at=j.created_at+12*M; j.verify1={by:OR_STAFF[0],at:T.verify1_at};
    }
    if(['IN_OR','SURGERY_FINISHED','IN_RR'].includes(st)){
      T.entered_or_at=j.created_at+20*M; j.verify2={by:OR_STAFF[1],at:T.entered_or_at};
    }
    if(['SURGERY_FINISHED','IN_RR'].includes(st)) T.surgery_finished_at=j.created_at+55*M;
    if(st==='IN_RR') T.received_rr_at=j.created_at+62*M;
    j.updated_at = T.received_rr_at||T.surgery_finished_at||T.entered_or_at||T.verify1_at||T.porter_received_at||j.created_at;
  });
  // finished earlier today -> gives the dashboard real averages to compute
  [['w1',-260,'or1',18,52,48],['w3',-205,'or2',24,71,63],['w2',-150,'or4',15,44,55]]
    .forEach(([wid,startAgo,room,toOR,surg,rr])=>{
      const j=Store.createJourney(wid,'PORTER',room);
      const t0=now()+startAgo*M, T=j.timestamps;
      j.status='COMPLETED'; j.created_at=t0;
      T.created_at_ward=t0; T.porter_received_at=t0+4*M;
      T.verify1_at=t0+Math.round(toOR*0.6)*M;
      T.entered_or_at=t0+toOR*M;
      T.surgery_finished_at=T.entered_or_at+surg*M;
      T.received_rr_at=T.surgery_finished_at+6*M;
      T.completed_at=T.received_rr_at+rr*M;
      j.updated_at=T.completed_at;
      j.verify1={by:OR_STAFF[0],at:T.verify1_at}; j.verify2={by:OR_STAFF[1],at:T.entered_or_at};
      j.staff_token=null; j.public_code=null; // revoked on completion
    });
  Store.audit=Store.audit.slice(0,4); // trim seed noise
}

/* dd(id, options[{v,label}], current, placeholder?) -> styled dropdown HTML.
   Selection routes through ddDispatch(id,val). Replaces native <select>. */
function dd(id, options, cur, placeholder){
  const curOpt = options.find(o=>o.v===cur);
  const shown = curOpt ? esc(curOpt.label) : (placeholder||'— เลือก —');
  return `<div class="dd" id="dd-${id}">
    <button type="button" class="dd-btn" onclick="ddToggle('${id}')" aria-haspopup="listbox">
      <span class="dd-val${curOpt?'':' ph'}">${shown}</span>${svg('chevronDown','dd-chev')}
    </button>
    <div class="dd-panel" role="listbox">
      ${options.map(o=>`<button type="button" class="dd-opt${o.v===cur?' sel':''}" data-val="${esc(o.v)}" onclick="ddPick(this,'${id}')">${svg('check','dd-tick')}<span>${esc(o.label)}</span></button>`).join('')}
    </div>
  </div>`;
}
function ddToggle(id){
  const root=document.getElementById('dd-'+id); if(!root) return;
  const willOpen=!root.classList.contains('open');
  document.querySelectorAll('.dd.open').forEach(d=>{d.classList.remove('open');d.classList.remove('up')});
  if(willOpen){
    const btn=root.querySelector('.dd-btn'), panel=root.querySelector('.dd-panel');
    const spaceBelow=window.innerHeight - btn.getBoundingClientRect().bottom;
    const need=Math.min(panel.scrollHeight+12, 276);
    if(spaceBelow < need + 16) root.classList.add('up');
    root.classList.add('open');
  }
}
function ddPick(el, id){
  const val=el.dataset.val, label=el.querySelector('span').textContent;
  const root=document.getElementById('dd-'+id);
  if(root){
    const v=root.querySelector('.dd-val'); v.textContent=label; v.classList.remove('ph');
    root.querySelectorAll('.dd-opt').forEach(o=>o.classList.remove('sel')); el.classList.add('sel');
    root.classList.remove('open');
  }
  ddDispatch(id, val);
}
function ddDispatch(id, val){
  if(id==='wardSel'){ State.wardId=val; render(); }
  else if(id==='srcWard'){ CForm.src=val; }
  else if(id==='destOR'){ CForm.dest=val; }
  else if(id==='vNurse'){ _vNurse=val; }
  else if(id==='vRoom'){ _vRoom=val; }
  else if(id==='pRoom'){ _pRoom=val; }
  else if(id==='pStaff'){ _pStaff=val; }
  else if(id==='rStaff'){ _rStaff=val; }
  else if(id==='eWard'){ _eWard=val; }
  else if(id==='eRoom'){ _eRoom=val; }
}

/* decorative deterministic QR-looking grid from token (mock only) */
function qrSVG(token){
  let seed=0;for(const c of token)seed=(seed*31+c.charCodeAt(0))>>>0;
  const n=13,cells=[];for(let i=0;i<n*n;i++){seed=(seed*1103515245+12345)&0x7fffffff;cells.push(seed%100<46)}
  let r='';for(let y=0;y<n;y++)for(let x=0;x<n;x++){if(cells[y*n+x])r+=`<rect x="${x}" y="${y}" width="1" height="1"/>`}
  return `<svg viewBox="0 0 ${n} ${n}" width="100%" height="100%" fill="#2B2A28">${r}</svg>`;
}

/* Shared operational overview for OR + RR staff.
   Aggregate numbers only — no patient data beyond the usual avatar + code. */
const WAIT_LIMIT = {WAITING_PORTER:30, PORTER_TO_OR:25, OR_VERIFY_1:20, IN_OR:180, IN_RR:120}; // minutes

function mins(a,b){return (a==null||b==null)?null:Math.round((b-a)/60000)}
function fmtDur(m){if(m==null)return'—';if(m<60)return`${m} นาที`;const h=Math.floor(m/60);return m%60?`${h} ชม. ${m%60} น.`:`${h} ชม.`}
function avgOf(list){const v=list.filter(x=>x!=null&&x>=0);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):null}

function dashboardView(){
  const live = Store.journeys.filter(j=>!['COMPLETED','CANCELLED'].includes(j.status));
  const doneToday = Store.journeys.filter(j=>j.status==='COMPLETED');
  const doneElective = doneToday.filter(j=>!j.is_emergency);   // averages exclude emergencies
  const emergLive = live.filter(j=>j.is_emergency).length;
  const emergDone = doneToday.filter(j=>j.is_emergency).length;

  /* --- room occupancy --- */
  const roomCard = r => {
    const occ = live.find(j=>j.or_room_id===r.id && ['OR_VERIFY_1','IN_OR'].includes(j.status));
    const coming = live.filter(j=>j.or_room_id===r.id && j.status==='PORTER_TO_OR').length;
    if(!occ) return `<div class="room-card free">
      <div class="room-card-h"><span class="room-name">${esc(r.name)}</span><span class="room-state free">ว่าง</span></div>
      <div class="room-empty">${coming?`${svg('stretcher')} กำลังนำส่ง ${coming} ราย`:'พร้อมรับเคส'}</div></div>`;
    const s=STATUS[occ.status], m=mins(occ.updated_at, now());
    return `<div class="room-card tap" onclick="openJourney('${occ.id}')" style="--rc:${s.color}">
      <div class="room-card-h"><span class="room-name">${esc(r.name)}</span><span class="room-state" style="background:${s.tint};color:${s.ink}">${svg(s.icon)}${s.label.split(' · ')[0]}</span></div>
      <div class="room-occ">${avatarEl(occ.avatar_id,'sm')}<div><div class="room-occ-n">${AV[occ.avatar_id].name}<span class="jcard-code"> · ${occ.case_code}</span></div>
      <div class="room-occ-t">${svg('clock')} ${fmtDur(m)}${coming?` · กำลังมาอีก ${coming}`:''}</div></div></div></div>`;
  };

  /* --- bottlenecks: anything past its stage limit --- */
  const late = live.map(j=>({j, m:mins(j.updated_at, now()), lim:WAIT_LIMIT[j.status]}))
    .filter(x=>x.lim && x.m!=null && x.m>x.lim)
    .sort((a,b)=>(b.m-b.lim)-(a.m-a.lim));

  /* --- averages from completed cases --- */
  const T=j=>j.timestamps;
  const avgToOR = avgOf(doneElective.map(j=>mins(T(j).porter_received_at, T(j).entered_or_at)));
  const avgSurg = avgOf(doneElective.map(j=>mins(T(j).entered_or_at, T(j).surgery_finished_at)));
  const avgRR   = avgOf(doneElective.map(j=>mins(T(j).received_rr_at, T(j).completed_at)));
  const avgAll  = avgOf(doneElective.map(j=>mins(T(j).porter_received_at, T(j).completed_at)));
  const maxBar = Math.max(avgToOR||0, avgSurg||0, avgRR||0, 1);
  const bar = (label,val,color) => `<div class="bar-row"><div class="bar-lb">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${val?Math.max(6,Math.round(val/maxBar*100)):0}%;background:${color}"></div></div>
    <div class="bar-val">${fmtDur(val)}</div></div>`;

  const inRoom = live.filter(j=>['OR_VERIFY_1','IN_OR'].includes(j.status)).length;

  return `
    <div class="stat-row" style="margin-top:6px">
      <div class="stat"><div class="n">${live.length}</div><div class="l">กำลังดำเนินการ</div></div>
      <div class="stat"><div class="n">${inRoom}/${OR_ROOMS.length}</div><div class="l">ห้องที่ใช้อยู่</div></div>
      <div class="stat"><div class="n">${doneToday.length}</div><div class="l">เสร็จวันนี้</div></div>
    </div>
    ${(emergLive||emergDone)?`<div class="emerg-strip">${svg('alert')}<span>เคสฉุกเฉินวันนี้ · กำลังดำเนินการ <b>${emergLive}</b> · เสร็จแล้ว <b>${emergDone}</b></span></div>`:''}

    <div class="section-title">${svg('door')} ผังห้องผ่าตัด</div>
    <div class="room-grid">${OR_ROOMS.map(roomCard).join('')}</div>

    <div class="section-title">${svg('alert')} เคสที่ใช้เวลานานกว่าปกติ <span class="count">${late.length}</span></div>
    ${late.length? late.map(({j,m,lim})=>`<div class="late-row tap" onclick="openJourney('${j.id}')">
        <span class="late-dot"></span>${avatarEl(j.avatar_id,'sm')}
        <div class="late-main"><div class="late-n">${AV[j.avatar_id].name}<span class="jcard-code"> · ${j.case_code}</span>${j.is_emergency?`<span class="em-chip">ฉุกเฉิน</span>`:''}${j.or_room?`<span class="room-chip">${esc(j.or_room)}</span>`:''}</div>
          <div class="late-s">${STATUS[j.status].label}</div></div>

        : `<div class="verify-row"><span class="chk-box ${j.verify1?'on':''}">${j.verify1?svg('check'):''}</span><span>ห้องผ่าตัด ครั้งที่ 1 · ${j.verify1?esc(j.verify1.by)+' · '+fmtTime(j.verify1.at):'รอยืนยัน'}</span></div>
           <div class="verify-row"><span class="chk-box ${j.verify2?'on':''}">${j.verify2?svg('check'):''}</span><span>ห้องผ่าตัด ครั้งที่ 2 · ${j.verify2?esc(j.verify2.by)+' · '+fmtTime(j.verify2.at):'รอยืนยัน'}</span></div>`}
      ${j.verifyRR?`<div class="verify-row"><span class="chk-box on">${svg('check')}</span><span>รับเข้าห้องพักฟื้น · ${esc(j.verifyRR.by)} · ${fmtTime(j.verifyRR.at)}</span></div>`:''}
    </div>`:''}
    <div class="eyebrow" style="margin:18px 0 12px">เส้นทางการเดินทาง</div>
    ${timeline(j)}
    ${action?`<button class="btn btn-primary" onclick="doAction('${j.id}','${action.to}')" style="margin-top:8px">${svg(action.icon)} ${action.label}</button>`:''}
    ${canSeeQR && j.staff_token?`<details style="margin-top:16px"><summary style="cursor:pointer;font-size:13.5px;color:var(--ink-2);font-weight:600;padding:8px 0">${svg('qr')} QR / โทเคนเจ้าหน้าที่</summary>${qrBlock(j)}</details>`:''}
    <button class="btn btn-ghost" style="margin:14px auto 0;width:auto" onclick="UI.closeSheet()">ปิด</button>
  `);
}
function timeline(j){
  const cur = STATUS[j.status].order;
  const tsMap={PORTER_TO_OR:'porter_received_at',OR_VERIFY_1:'verify1_at',IN_OR:'entered_or_at',SURGERY_FINISHED:'surgery_finished_at',IN_RR:'received_rr_at',COMPLETED:'completed_at'};
  return `<div class="timeline">${FLOW.map((st,i)=>{
    const o=STATUS[st].order;const done=o<cur;const isCur=st===j.status;
    const t=j.timestamps[tsMap[st]];
    const cls=done?'done':isCur?'current':'';
    const dot = done?svg('check'):isCur?svg(STATUS[st].icon):'';
    return `<div class="tl-item ${cls}"><div class="tl-rail"><div class="tl-dot">${dot}</div>${i<FLOW.length-1?'<div class="tl-line"></div>':''}</div>
      <div class="tl-content"><div class="tl-label">${STATUS[st].label}</div>${t?`<div class="tl-meta">${fmtTime(t)}</div>`:isCur?`<div class="tl-meta">กำลังดำเนินการ</div>`:''}</div></div>`;
  }).join('')}</div>`;
}

      <p style="font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:12px">อ่านชื่อ-นามสกุลจากป้ายข้อมือ และตรวจสอบว่าตรงกับผู้ป่วยรายนี้ ระบบจะบันทึกเพียงว่า “ยืนยันแล้ว” และผู้ยืนยัน โดย<b>ไม่เก็บชื่อผู้ป่วย</b></p>
      <label class="chk" onclick="_vChecked=!_vChecked;this.classList.toggle('on',_vChecked)">
        <span class="chk-box">${svg('check')}</span>
        <span>ชื่อ-นามสกุลตรงกับป้ายข้อมือ</span>
      </label>
      <div class="field" style="margin-top:14px">
        <label>ผู้ยืนยัน (พยาบาลครั้งที่ ${step})</label>
        ${dd('vNurse', pool.map(n=>({v:n,label:n})), '', '— เลือกพยาบาล —')}
      </div>
      ${step===1&&!j.is_emergency?`<div class="field" style="margin-top:12px">
        <label>ห้องผ่าตัด</label>
        ${dd('vRoom', OR_ROOMS.map(o=>({v:o.id,label:o.name})), j.or_room_id||'', '— เลือกห้อง —')}
        <div class="help">หน่วยเปลระบุมาแล้ว แก้ไขได้หากมีการสลับห้อง</div>
      </div>`:''}
    </div>
    <button class="btn btn-primary" onclick="commitVerify('${j.id}',${step})">${svg('userCheck')} ${(step===2||j.is_emergency)?'ยืนยันและเริ่มผ่าตัด':'ยืนยันตัวผู้ป่วย'}</button>
    <button class="btn btn-ghost" style="margin:10px auto 0;width:auto" onclick="UI.closeSheet()">ยกเลิก</button>
  `);
}
function commitVerify(jid, step){
  if(!_vChecked){UI.toast('กรุณาติ๊กยืนยันว่าตรงกับป้ายข้อมือ','err');return}
  if(!_vNurse){UI.toast('กรุณาเลือกพยาบาลผู้ยืนยัน','err');return}
  const _j=Store.journeys.find(x=>x.id===jid);
  if(step===1 && !_j?.is_emergency && !_vRoom){UI.toast('กรุณาเลือกห้องผ่าตัด','err');return}
  if(step===1 && !_j?.is_emergency){
    const j=Store.journeys.find(x=>x.id===jid), r=OR_ROOMS.find(o=>o.id===_vRoom);
    if(j&&r){j.or_room_id=r.id; j.or_room=r.name; j.dest=r.name;}
  }
  const res=Store.verify(jid, step, _vNurse, State.role);
  UI.closeSheet();
  if(res.ok){UI.toast(_j?.is_emergency?'ยืนยันแล้ว · เริ่มผ่าตัด':(step===2?'ยืนยันครบ 2 คน · เริ่มผ่าตัด':'ยืนยันตัวครั้งที่ 1 แล้ว'),'ok');render()}
  else UI.toast(res.msg,'err');
}

function commitPickup(jid){
  if(!_pChecked){UI.toast('กรุณาติ๊กยืนยันว่าตรงกับป้ายข้อมือ','err');return}
  if(!_pStaff){UI.toast('กรุณาเลือกเจ้าหน้าที่ผู้รับ','err');return}

  const j=Store.journeys.find(x=>x.id===jid), r=OR_ROOMS.find(o=>o.id===_pRoom);
  if(j&&r){j.or_room_id=r.id; j.or_room=r.name; j.dest=r.name;}
  if(j){j.verifyPorter={by:_pStaff, at:now()}; Store.logEvent(j.id,'IDENTITY_VERIFIED',{stage:'PORTER',staff:_pStaff});
        Store.audit.unshift(auditRow(State.role,'IDENTITY_VERIFIED','journey',j.id,true,{stage:'PORTER',staff:_pStaff}));}
  const res=Store.transition(jid,'PORTER_TO_OR',State.role);
  UI.closeSheet();
  if(res.ok){UI.toast(`ยืนยันป้ายข้อมือแล้ว · นำส่ง ${r.name}`,'ok');render()}
  else UI.toast(res.msg,'err');
}

/* RR receives the patient from OR — same wristband check at the handoff. */
let _rChecked=false, _rStaff='';
function openRRReceiveSheet(j){
  _rChecked=false; _rStaff='';
  UI.openSheet(`
    <h3>รับผู้ป่วยเข้าห้องพักฟื้น</h3>
    <p class="sheet-sub">${AV[j.avatar_id].name} · ${j.case_code}${j.or_room?' · '+esc(j.or_room):''}</p>
    <div class="tile" style="margin-bottom:14px">
      <div style="font-size:14.5px;font-weight:600;margin-bottom:4px">${svg('wristband','lbl-ic')} ตรวจสอบป้ายข้อมือผู้ป่วย</div>
      <p style="font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:12px">ตรวจสอบป้ายข้อมือกับเจ้าหน้าที่ห้องผ่าตัดขณะรับมอบ ระบบบันทึกเพียงว่ายืนยันแล้วและผู้ยืนยัน โดย<b>ไม่เก็บชื่อผู้ป่วย</b></p>
      <label class="chk" onclick="_rChecked=!_rChecked;this.classList.toggle('on',_rChecked)">
        <span class="chk-box">${svg('check')}</span><span>ชื่อ-นามสกุลตรงกับป้ายข้อมือ</span>
      </label>
      <div class="field" style="margin:14px 0 0">
        <label>ผู้รับผู้ป่วย (ห้องพักฟื้น)</label>
        ${dd('rStaff', RR_STAFF.map(n=>({v:n,label:n})), '', '— เลือกพยาบาล —')}
      </div>
    </div>
    <button class="btn btn-primary" onclick="commitRRReceive('${j.id}')">${svg('heart')} รับเข้าห้องพักฟื้น</button>
    <button class="btn btn-ghost" style="margin:10px auto 0;width:auto" onclick="UI.closeSheet()">ยกเลิก</button>
  `);
}
function commitRRReceive(jid){
  if(!_rChecked){UI.toast('กรุณาติ๊กยืนยันว่าตรงกับป้ายข้อมือ','err');return}
  if(!_rStaff){UI.toast('กรุณาเลือกพยาบาลผู้รับ','err');return}
  const j=Store.journeys.find(x=>x.id===jid);
  if(j){j.verifyRR={by:_rStaff, at:now()}; Store.logEvent(j.id,'IDENTITY_VERIFIED',{stage:'RR',staff:_rStaff});
        Store.audit.unshift(auditRow(State.role,'IDENTITY_VERIFIED','journey',j.id,true,{stage:'RR',staff:_rStaff}));}
  const res=Store.transition(jid,'IN_RR',State.role);
  UI.closeSheet();
  if(res.ok){UI.toast('ยืนยันป้ายข้อมือแล้ว · รับเข้า RR','ok');render()}
  else UI.toast(res.msg,'err');
}

/* ---------------------------- EMERGENCY (OR-initiated) ------------------- */
/* An emergency case never waits on the ward or a porter. OR opens the case on the
   spot. If there is no time even for this, do the case and log it afterwards —
   this app is not a medical record and must never sit on the critical path. */
let _eWard='', _eRoom='';
function openEmergencySheet(){
  _eWard='er'; _eRoom='';
  UI.openSheet(`
    <h3>เปิดเคสฉุกเฉิน</h3>
    <p class="sheet-sub">ข้ามขั้นตอนหอผู้ป่วยและหน่วยเปล เข้าสู่ห้องผ่าตัดทันที</p>
    <div class="notice emerg-notice" style="margin-bottom:14px">${svg('alert')}<span>หากไม่มีเวลาแม้แต่จะกดปุ่มนี้ <b>ให้ดูแลผู้ป่วยก่อน</b> แล้วค่อยบันทึกย้อนหลัง ระบบนี้ไม่ใช่เวชระเบียนและต้องไม่ทำให้การรักษาช้าลง</span></div>
    <div class="tile" style="margin-bottom:14px">
      <div class="field">
        <label>ผู้ป่วยมาจาก</label>
        ${dd('eWard', WARDS.map(w=>({v:w.id,label:w.name})), 'er')}
      </div>
      <div class="field" style="margin-bottom:0">
        <label>ห้องผ่าตัด</label>
        ${dd('eRoom', OR_ROOMS.map(o=>({v:o.id,label:o.name})), '', '— เลือกห้อง —')}
      </div>
    </div>
    <button class="btn btn-emerg" onclick="commitEmergency()">${svg('alert')} เปิดเคสฉุกเฉิน</button>
    <button class="btn btn-ghost" style="margin:10px auto 0;width:auto" onclick="UI.closeSheet()">ยกเลิก</button>
  `);
}
function commitEmergency(){
  if(!_eRoom){UI.toast('กรุณาเลือกห้องผ่าตัด','err');return}
  const j=Store.createJourney(_eWard||'er','OR',_eRoom,true);
  UI.closeSheet();
  UI.toast('เปิดเคสฉุกเฉินแล้ว · ยืนยันตัวผู้ป่วยเมื่อพร้อม','ok');
  openFamilyCard(j.id, true);
  render();
}

/* ---------------------------- ACTIONS (transitions) --------------------- */
function doAction(jid, to){
  const j=Store.journeys.find(x=>x.id===jid);if(!j)return;
  const t=(TRANSITIONS[j.status]||[]).find(x=>x.to===to && x.role===State.role);
  if(!t){UI.toast('ไม่สามารถดำเนินการนี้ได้','err');return}
  if(!Store.online){UI.toast('ไม่มีการเชื่อมต่อ — โปรดลองใหม่','err');return}
  if(t.verify){openVerifySheet(j, t.verify);return}
  if(t.pickup){openPickupSheet(j);return}
  if(t.rrReceive){openRRReceiveSheet(j);return}
  const commit=()=>{
    const res=Store.transition(jid,to,State.role);
    UI.closeSheet();
    if(res.ok){UI.toast(t.handoff?'ยืนยันรับมอบผู้ป่วยแล้ว':'อัปเดตสถานะแล้ว','ok');render();}
    else UI.toast(res.msg,'err');
  };
  if(t.confirm){
    UI.openSheet(`<h3>ยืนยันการดำเนินการ</h3><p class="sheet-sub">${AV[j.avatar_id].name} · ${j.case_code}</p>
      <div class="tile" style="margin-bottom:18px;text-align:center">
        <div style="font-size:15px;margin-bottom:4px">เปลี่ยนสถานะเป็น</div>
        <div style="font-weight:600;font-size:17px;color:${STATUS[to].ink}">${STATUS[to].label}</div></div>
      <button class="btn btn-primary" onclick="_commitAction('${jid}','${to}')">${svg('check')} ยืนยัน</button>
      <button class="btn btn-ghost" style="margin:10px auto 0;width:auto" onclick="UI.closeSheet()">ยกเลิก</button>`);
    window._commitAction=(a,b)=>{const r=Store.transition(a,b,State.role);UI.closeSheet();if(r.ok){UI.toast('อัปเดตสถานะแล้ว','ok');render()}else UI.toast(r.msg,'err')};
  } else commit();
}

/* ---------------------------- HISTORY ------------------------------------ */
function historyView(){
  const done = Store.journeys.filter(j=>['COMPLETED','CANCELLED'].includes(j.status));
  return `<div class="notice">${svg('history')}<span>Journey ที่สิ้นสุดแล้ว อวตาร์และรหัสถูกยกเลิกการใช้งาน แต่ยังเก็บ timeline และบันทึกไว้เพื่อการตรวจสอบ</span></div>
    <div class="section-title">${svg('check')} เสร็จสิ้น <span class="count">${done.length}</span></div>
    ${done.length?done.map(j=>`<div class="jcard tap" onclick="openJourney('${j.id}')"><div class="jcard-top" style="opacity:.85">${avatarEl(j.avatar_id,'sm')}
      <div class="jcard-body"><div class="jcard-name" style="font-size:15px">${AV[j.avatar_id].name}<span class="jcard-code">· ${j.case_code}</span></div>
      <div style="margin-top:6px">${statusPill(j.status)}</div></div>
      <span class="jcard-time" style="align-self:center">${fmtTime(j.updated_at)}</span></div></div>`).join(''):emptyState('history','ยังไม่มีประวัติ','Journey ที่เสร็จสิ้นจะแสดงที่นี่')}`;
}

/* ---------------------------- AUDIT LOG (admin) -------------------------- */
const AUDIT_IC={LOGIN_SUCCESS:'user',JOURNEY_CREATED:'plus',EMERGENCY_CREATED:'alert',WAITING_PORTER:'bed',PORTER_TO_OR:'stretcher',IDENTITY_VERIFIED:'idCard',STATUS_CHANGED:'refresh',PUBLIC_STATUS_LOOKUP:'search',QR_REVOKED:'shield',JOURNEY_COMPLETED:'check',INVALID_TRANSITION:'alert',JOURNEY_CANCELLED:'x'};
function auditView(){
  return `<div class="notice">${svg('shield')}<span>บันทึกการใช้งานทั้งหมด บันทึกด้วยเวลาจากเซิร์ฟเวอร์ ผู้ดูแลระบบไม่สามารถแก้ไขได้</span></div>
    <div class="section-title">${svg('list')} เหตุการณ์ล่าสุด <span class="count">${Store.audit.length}</span></div>
    <div class="tile" style="padding:6px 16px">
    ${Store.audit.slice(0,40).map(a=>`<div class="log-row">
      <div class="log-ic" style="${a.success?'':'color:var(--clay);background:var(--clay-tint);border-color:transparent'}">${svg(AUDIT_IC[a.action]||'info')}</div>
      <div class="log-main"><div class="log-act">${a.action}${a.success?'':' · ล้มเหลว'}</div>
      <div class="log-meta">${a.actor} · ${a.resource_type}${a.resource_id?' · '+a.resource_id:''}${a.meta&&Object.keys(a.meta).length?' · '+esc(JSON.stringify(a.meta)):''}</div></div>
      <div class="log-time">${fmtTime(a.at)}</div></div>`).join('')}
    </div>`;
}

    ['rooms','ห้องผ่าตัด','จัดการห้อง OR และสถานี','door'],
    ['avatars','อวตาร์','ชุดอวตาร์ธรรมชาติ 12 แบบ','heart'],

      <div class="stat"><div class="n">${WARDS.length}</div><div class="l">วอร์ด</div></div>
      <div class="stat"><div class="n">${AVATARS.length}</div><div class="l">อวตาร์</div></div>
    </div>
    <div class="section-title">${svg('settings')} การจัดการระบบ</div>

      <span class="ro-ic" style="width:46px;height:46px;border-radius:13px;display:grid;place-items:center;background:var(--paper);border:1px solid var(--line);color:var(--ink-2)">${svg(ic)}</span>
      <div class="jcard-body"><div style="font-weight:600;font-size:15.5px">${t}</div><div style="font-size:12.5px;color:var(--ink-2);margin-top:2px">${d}</div></div>
      <span style="color:var(--ink-3)">${svg('arrowRight')}</span></div></div>`).join('')}
    <div class="notice" style="margin-top:14px">${svg('shield')}<span>ผู้ดูแลระบบจัดการการตั้งค่าและบัญชีได้ แต่การเข้าถึงข้อมูล Journey ที่ละเอียดยังถูกควบคุมแยกตามนโยบาย</span></div>
  `;
}
function adminOpen(k){
  const map={
    wards:`<h3>วอร์ด</h3><p class="sheet-sub">${WARDS.length} หอผู้ป่วย</p>${WARDS.map(w=>`<div class="log-row"><div class="log-ic">${svg('bed')}</div><div class="log-main"><div class="log-act">${w.name}</div><div class="log-meta">${w.id}</div></div></div>`).join('')}`,
    avatars:`<h3>อวตาร์</h3><p class="sheet-sub">ชุดอวตาร์ธรรมชาติ นุ่มนวล เป็นกลาง</p><div class="avgrid">${AVATARS.map(a=>`<div class="avpick">${avatarEl(a.id,'sm')}<span class="nm">${a.name}</span></div>`).join('')}</div>`,
    status:`<h3>ป้ายสถานะ</h3><p class="sheet-sub">ภายใน → สาธารณะ</p>${FLOW.map(st=>`<div class="log-row"><div class="log-ic" style="color:${STATUS[st].ink}">${svg(STATUS[st].icon)}</div><div class="log-main"><div class="log-act">${STATUS[st].label}</div><div class="log-meta">${st} · ${STATUS[st].pub}</div></div></div>`).join('')}`,
  };
  UI.openSheet((map[k]||`<h3>${k}</h3><p class="sheet-sub">ส่วนนี้เป็นตัวอย่างในเดโม</p>`)+`<button class="btn btn-ghost" style="margin:14px auto 0;width:auto" onclick="UI.closeSheet()">ปิด</button>`);
}
